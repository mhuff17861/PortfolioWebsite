{% extends "base.html" %}

{% comment "Overview" %}
        This template generates a generic form, based on a passed form defined in 
        forms.py
{% endcomment %}

{% block title %} {{ title }} {% endblock %}

{% block main-content %}

<div class="container">
        <div class="row justify-content-center">
                <h1 class="col-9 text-center p-3">
                        {{ title }}
                </h1>
        </div>

        <form class="row justify-content-center" action='{{ action }}' method='post'>
                {% csrf_token %}
                {{ form.as_p }}
                <input type="submit" value="Submit">
        </form>
</div>

{% endblock %}
